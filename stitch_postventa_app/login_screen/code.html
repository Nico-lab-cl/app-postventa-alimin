<style>.glass-effect {
    background: rgba(28, 27, 27, 0.45);
    backdrop-filter: blur(24px);
    -webkit-backdrop-filter: blur(24px)
    }
.material-symbols-outlined {
    font-variation-settings: "FILL" 0, "wght" 400, "GRAD" 0, "opsz" 24
    }
.bg-land-landscape {
    background-image: linear-gradient(to bottom, rgba(19, 19, 19, 0.6), rgba(19, 19, 19, 0.95)), url(https://lh3.googleusercontent.com/aida-public/AB6AXuAi1Ps5yYYrXkEf3P0EYvNCxvLpYxUHconsF15DF9_pWthyQgCiKnmjHlGjJ3iV6TYwzhh-9dWWkLum1geMMGtvhtmpeejSJJbi-UiWxCQ11dsihV6riZADCOMz6oYaLgiIQhQ0UUiF6pdKI9GjWryBNXoT3yBuSGiqnaRTmzPBOFERBdK5pdUFHMGK7uDHzcM405ODhJ_gOlEqHueJ_NkM8AXhJaI_nCfOxn_wxRT_cQ_zSCwg1EC4c4fpOacDhPejP1izp7B7kQPX);

    body {
      min-height: max(884px, 100dvh);

<body class="bg-background text-on-surface font-body min-h-screen selection:bg-secondary/30">
<main class="relative min-h-screen flex items-center justify-center p-6 overflow-hidden bg-land-landscape" data-alt="Cinematic aerial view of rolling coastal hills at dusk with deep shadows and soft moonlight reflecting on distant waves">
<!-- Background Bloom Decor -->
<div class="absolute -top-[10%] -left-[10%] w-[50%] h-[50%] rounded-full bg-primary-container/20 blur-[120px]"></div>
<div class="absolute -bottom-[10%] -right-[10%] w-[50%] h-[50%] rounded-full bg-secondary-container/10 blur-[120px]"></div>
<div class="w-full max-w-md relative z-10 flex flex-col gap-12">
<!-- Branding Header -->
<div class="flex flex-col items-center gap-6">
<div class="relative w-24 h-24 flex items-center justify-center">
<div class="absolute inset-0 bg-secondary/10 rounded-full blur-2xl"></div>
<img alt="Lomas del Mar Logo" class="relative w-full h-full object-contain" data-alt="Monochromatic golden architectural leaf logo representing luxury real estate brand in a minimalist style" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCBsx8TKlTmN78jKIMdO-InU-aJA8Fp95-Dlw3o7n1G9Fmk_VeMwAa2TxoL1DuR4z0Y85FEk0hhwqHv9enXaC8qETnzGYPwrKkMAgLA-ScPnRhKQaYKsEQqKyhn5-_IfOKE7XkAsF2Dm8tHT-5l477AQyXA2okTyQbnFW5O7FSILnTFArLBr4CJ4vT0klcZuXO8q6Lv3cI4cQBp8yED62cv3yy0jonid6o10Eanu1ruubyy9jFaKR-KO0Qx8Qa_ZNSuzrfQauNuAtXJ"/>
</div>
<div class="text-center space-y-1">
<h1 class="font-display font-black text-3xl tracking-tighter text-on-surface uppercase">Lomas del Mar</h1>
<p class="font-label text-xs tracking-[0.2em] uppercase text-on-surface-variant font-semibold">Postventa &amp; Gestión</p>
</div>
</div>
<!-- Login Form Card -->
<div class="glass-effect rounded-3xl p-8 border border-white/5 shadow-2xl space-y-8">
<div class="space-y-2">
<h2 class="font-display text-2xl font-bold text-on-surface">Bienvenido</h2>
<p class="text-on-surface-variant text-sm">Ingresa tus credenciales para acceder al portal.</p>
</div>
<form class="space-y-6">
<!-- Email Field -->
<div class="space-y-2">
<label class="block font-label text-xs font-semibold text-on-surface-variant uppercase tracking-wider ml-1" for="email">Correo Electrónico</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant transition-colors group-focus-within:text-secondary">mail</span>
<input class="w-full bg-surface-container-high border-0 rounded-2xl py-4 pl-12 pr-4 text-on-surface placeholder:text-on-surface-variant/40 focus:ring-2 focus:ring-secondary/50 transition-all" id="email" placeholder="nombre@ejemplo.com" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-2">
<label class="block font-label text-xs font-semibold text-on-surface-variant uppercase tracking-wider ml-1" for="password">Contraseña</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant transition-colors group-focus-within:text-secondary">lock</span>
<input class="w-full bg-surface-container-high border-0 rounded-2xl py-4 pl-12 pr-12 text-on-surface placeholder:text-on-surface-variant/40 focus:ring-2 focus:ring-secondary/50 transition-all" id="password" placeholder="••••••••" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-on-surface-variant hover:text-on-surface" type="button">
<span class="material-symbols-outlined">visibility</span>
</button>
</div>
</div>
<!-- Sub-actions -->
<div class="flex justify-end px-1">
<a class="text-sm font-medium text-secondary hover:text-secondary/80 transition-colors" href="#">¿Olvidaste tu contraseña?</a>
</div>
<!-- Primary Button -->
<button class="w-full bg-secondary text-on-secondary font-display font-bold text-lg py-4 rounded-3xl shadow-lg shadow-secondary/10 active:scale-95 transition-all duration-200" type="submit">
                        Iniciar Sesión
                    </button>
</form>
</div>
<!-- Footer links / Register -->
<div class="text-center">
<p class="text-on-surface-variant text-sm">
                    ¿No tienes una cuenta? 
                    <a class="text-on-surface font-bold hover:underline underline-offset-4" href="#">Contactar Soporte</a>
</p>
</div>
</div>
<!-- Semantic Design Accents -->
<div class="absolute bottom-10 left-10 hidden lg:block">
<div class="flex flex-col gap-2 opacity-40">
<div class="h-[1px] w-24 bg-gradient-to-r from-secondary to-transparent"></div>
<span class="text-[10px] font-label uppercase tracking-widest text-on-surface-variant">Residential Portal v2.0</span>
</div>
</div>
</main>
</body></html>
